name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch # 1.2.3 -> 1.2.4
          - minor # 1.2.3 -> 1.3.0
          - major # 1.2.3 -> 2.0.0

permissions:
  contents: write
  packages: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Configure Git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine previous tag (if any)
        id: prev
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            echo "prev_tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          else
            echo "prev_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Bump version and tag
        env:
          BUMP: ${{ inputs.bump }}
        run: npm version "$BUMP" -m "v%s"

      - name: Push commit and tags
        run: |
          git push origin HEAD
          git push origin --tags

      - name: Read new version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build release notes from commits
        id: notes
        shell: bash
        run: |
          CURR_TAG="v${{ steps.ver.outputs.version }}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$CURR_TAG"
          else
            RANGE="$CURR_TAG"
          fi
          BODY=$(git log --pretty=format:"- %s" $RANGE | sed '/^$/d')
          [ -z "$BODY" ] && BODY="- Release $CURR_TAG"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
